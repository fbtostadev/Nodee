name: CI

# Garante que o app compila antes de qualquer merge.
# Roda em PRs para develop/main e em push direto nessas branches.
on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

# Cancela builds antigos do mesmo PR quando chega um commit novo.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Scan estático de compliance com a App Store (privacy manifest,
  # Required Reason APIs, padrões de rejeição). Roda em Linux por ser
  # mais barato — não precisa de Xcode, só do código-fonte.
  compliance:
    name: Compliance (Greenlight)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      # Pinado em commit porque a release v0.1.0 ainda não lê .greenlight.yml.
      - name: Instalar Greenlight
        run: go install github.com/RevylAI/greenlight/cmd/greenlight@8cf34221865d

      - name: Preflight scan
        run: greenlight preflight . --exit-code

  build:
    name: Build (macOS)
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Versão do Xcode
        run: xcodebuild -version

      - name: Build
        run: |
          set -o pipefail
          FORMATTER="cat"
          if command -v xcbeautify >/dev/null 2>&1; then FORMATTER="xcbeautify"; fi
          xcodebuild build \
            -project Nodee.xcodeproj \
            -scheme Nodee \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | $FORMATTER
